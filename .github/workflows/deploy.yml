name: Deploy to Cloudflare Workers

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # opennextjs-cloudflare build runs `next build` internally, which
      # imports every route module (even fully-dynamic ones) to collect page
      # data — that trips lib/session.ts's top-level SESSION_SECRET check, so
      # the dummy value has to reach this exact step, not just `npm run build`.
      - name: Build (dummy session secret — build-time only, never serves traffic)
        run: npx opennextjs-cloudflare build
        env:
          SESSION_SECRET: ci-build-only-secret-not-used-at-runtime-000000

      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
